name: llm-hello
description: Load LLM plugin via Maven, send a prompt to LLM Console (Claude) via MCP Gateway

steps:
  - states: ["0", "1"]
    label: load-jar
    note: Load LLM plugin JAR from local Maven repository
    actions:
      - actor: loader
        method: loadJar
        arguments: "com.scivicslab.turingworkflow.plugins:plugin-llm:1.0.0"

  - states: ["1", "2"]
    label: create-llm-actor
    note: Create llm actor under workflow root
    actions:
      - actor: loader
        method: createChild
        arguments:
          - ROOT
          - llm
          - com.scivicslab.turingworkflow.plugins.llm.LlmActor

  - states: ["2", "3"]
    label: set-gateway-url
    note: Point LLM actor to MCP Gateway (llm-console-claude)
    actions:
      - actor: llm
        method: setUrl
        arguments: http://localhost:8090/mcp

  - states: ["3", "4"]
    label: check-status
    note: Check LLM Console status via MCP Gateway
    actions:
      - actor: llm
        method: status
        arguments: ""

  - states: ["4", "5"]
    label: send-prompt
    note: Send a simple prompt to Claude via MCP Gateway
    actions:
      - actor: llm
        method: prompt
        arguments: "Hello! Please respond with a short greeting and tell me what you can do."

  - states: ["5", "end"]
    label: done
    note: Log completion
    actions:
      - actor: log
        method: info
        arguments: Workflow completed successfully

  - states: ["!end", "end"]
    label: catch-all
    note: Prevent infinite loop
    actions:
      - actor: log
        method: warn
        arguments: Unexpected state - forcing end

name: Publish Javadoc

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  javadoc:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Javadoc
        run: mvn javadoc:aggregate -DskipTests -q || mvn javadoc:javadoc -pl plugin-llm -DskipTests -q

      - name: Prepare pages structure
        run: |
          mkdir -p _site/plugin-llm/apidocs
          if [ -d target/site/apidocs ]; then
            cp -r target/site/apidocs/* _site/plugin-llm/apidocs/
          elif [ -d plugin-llm/target/site/apidocs ]; then
            cp -r plugin-llm/target/site/apidocs/* _site/plugin-llm/apidocs/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
